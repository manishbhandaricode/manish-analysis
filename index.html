<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Manish Analysis</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f5ef;
        color: #171717;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(720px, calc(100% - 40px));
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 6vw, 4rem);
        line-height: 1;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        max-width: 54ch;
        color: #4b5563;
        font-size: 1.125rem;
        line-height: 1.7;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          background: #111827;
          color: #f9fafb;
        }

        p {
          color: #d1d5db;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Manish Analysis</h1>
      <p>A clean starting point for analysis notes, dashboards, experiments, and published insights.</p>
    </main>
  </body>
</html>
